# Clip manifest — add entries after generating .gif files via flipdisc.clips.importer.
# Timing is baked into each GIF; the optional fps key overrides the GIF's embedded duration.
#
# Example entry:
# [rain]
# path        = "assets/clips/rain.gif"
# loop        = true
# description = "28x28 rain animation"
# width       = 28
# height      = 28
